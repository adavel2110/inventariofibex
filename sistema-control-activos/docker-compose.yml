services:
  postgres:
    image: postgres:16-alpine
    container_name: fibex-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Abcd1234
      POSTGRES_DB: inventario_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventario_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fibex-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://admin:Abcd1234@postgres:5432/inventario_db?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "fibex-inventario-secret-key-2026-seguro"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: